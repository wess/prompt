id = "notes"
name = "Notes"
version = "1.0.0"
description = "A lightweight markdown-vault editor. Was built-in; now a first-party plugin backed by the bundled notes server via the host-managed sidecar."

# The Notes editor is a native web app served by the bundled `notes` binary. The
# host runs it as a managed sidecar (`service`): it allocates the address, and
# the page loads from that http origin — the same behavior as the former built-in
# Notes, with no bun dependency. See docs/pluginsv2.md.
[webview]
id = "notes"
title = "Notes"
icon = "✎"
placement = "tab"
service = "notes serve"
